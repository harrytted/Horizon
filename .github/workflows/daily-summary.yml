name: Daily Horizon Summary

on:
  schedule:
    # Three retries at 08:07, 09:07, and 10:07 Asia/Shanghai.
    - cron: '7 0 * * *'
    - cron: '7 1 * * *'
    - cron: '7 2 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check whether today's summary already exists
        id: daily-summary
        if: github.event_name == 'schedule'
        run: |
          DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')
          git fetch origin gh-pages:refs/remotes/origin/gh-pages --depth=1 || true
          if git cat-file -e "origin/gh-pages:_posts/${DATE}-summary-zh.md" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Summary for ${DATE} already exists; skipping this retry."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.daily-summary.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.daily-summary.outputs.exists != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        if: steps.daily-summary.outputs.exists != 'true'
        run: uv sync

      - name: Prepare GitHub Actions config
        if: steps.daily-summary.outputs.exists != 'true'
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        if: steps.daily-summary.outputs.exists != 'true'
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        if: steps.daily-summary.outputs.exists != 'true'
        run: echo "DATE=$(TZ=Asia/Shanghai date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        if: steps.daily-summary.outputs.exists != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
